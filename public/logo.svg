<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" width="100%" height="100%">
  <defs>
    <!-- Define soft gradients for the overlapping organic shapes -->
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    <linearGradient id="blob2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <linearGradient id="blob3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
  </defs>

  <!-- Left: Overlapping Organic Blobs matching the uploaded logo -->
  <g id="logo-mark" opacity="0.9">
    <!-- Back Blobs -->
    <path d="M12,23 C12,15 18,10 28,10 C38,10 41,16 41,23 C41,30 35,36 25,36 C15,36 12,30 12,23 Z" fill="url(#blob2)" opacity="0.65" />
    <path d="M16,25 C16,17 22,12 32,12 C42,12 45,18 45,25 C45,32 39,37 29,37 C19,37 16,32 16,25 Z" fill="url(#blob1)" opacity="0.55" />
    <!-- Front Focal Blob -->
    <path d="M14,24 C14,16 20,11 30,11 C40,11 43,17 43,24 C43,31 37,36 27,36 C17,36 14,31 14,24 Z" fill="url(#blob3)" opacity="0.6" />
  </g>

  <!-- Right: Brand Typography matching 'Exo' bold condensed look -->
  <text 
    x="52" 
    y="31.5" 
    font-family="'Exo', 'Oxygen', 'Inter', sans-serif" 
    font-size="22" 
    font-weight="800" 
    letter-spacing="-0.02em" 
    fill="#139cd8"
  >FOODCLOUD</text>
</svg>
